name: Live Smoke

# Manual-only live verification against stats.wnba.com. GitHub-hosted runners
# have open outbound network, so this is where the source contract's pending
# claims (docs/source-contract.md, C01–C17) get confirmed and robots/ToS get
# checked. The development sandbox blocks *.wnba.com, so this MUST be run here,
# not locally. Nothing is committed — captures are uploaded as artifacts only.

on:
  workflow_dispatch:
    inputs:
      season:
        description: "Season year (applies to the live extraction; the contract capture is pinned to 2026)"
        required: false
        default: "2026"
      probe_400:
        description: "Also probe the missing-parameter 400 behavior (extra request)"
        required: false
        default: "false"

permissions:
  contents: read

concurrency:
  group: wnba-live-smoke
  cancel-in-progress: false

jobs:
  live-smoke:
    name: live-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: python -m pip install --upgrade pip && pip install -e "."

      - name: Capture and verify live source contract
        id: capture
        run: |
          set -uo pipefail
          # The capture script verifies the pinned 2026 source contract
          # (params, claim registry C01-C17 and reference teams are 2026-scoped),
          # so it takes no --season. --compat-headers sends the platform hint
          # headers (x-nba-stats-*) the stats edge needs to answer instead of
          # stalling; a longer timeout tolerates a slow first response.
          ARGS="--compat-headers --timeout 60"
          if [ "${{ github.event.inputs.probe_400 }}" = "true" ]; then
            ARGS="$ARGS --probe-400"
          fi
          set +e
          python3 scripts/capture_live_contract.py $ARGS
          echo "capture_exit=$?" >> "$GITHUB_OUTPUT"
          set -e

      - name: Conservative live extraction (not committed)
        id: live
        run: |
          set -uo pipefail
          set +e
          wnba-pipeline run \
            --season "${{ github.event.inputs.season || '2026' }}" \
            --data-root "$RUNNER_TEMP/live-data" > live-manifest.json
          echo "live_exit=$?" >> "$GITHUB_OUTPUT"
          set -e
          echo "## Live smoke result" >> "$GITHUB_STEP_SUMMARY"
          python3 scripts/manifest_summary.py live-manifest.json >> "$GITHUB_STEP_SUMMARY"

      - name: Upload sanitized captures + manifest
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: live-smoke-artifacts
          # Only sanitized captures + the run manifest — no raw debug material.
          path: |
            fixtures/sanitized/live_capture_*.json
            live-manifest.json
          retention-days: 14
          if-no-files-found: warn

      - name: Report reachability and fail if the source was unreachable
        run: |
          CE="${{ steps.capture.outputs.capture_exit }}"
          LE="${{ steps.live.outputs.live_exit }}"
          {
            echo "## Live reachability"
            echo "- capture exit: \`$CE\`  ·  extraction exit: \`$LE\`  (0 = ok)"
          } >> "$GITHUB_STEP_SUMMARY"
          if [ "$CE" != "0" ] || [ "$LE" != "0" ]; then
            {
              echo ""
              echo "**The live source could not be reached from this runner.**"
              echo ""
              echo "GitHub-hosted runners use datacenter (Azure) IPs that stats.wnba.com"
              echo "(Akamai edge) commonly blocks — seen here as connection timeouts"
              echo "(capture exit 4 / extraction exit 3) or an explicit HTTP 403"
              echo "(capture exit 3). This is an environment/egress limitation, not a"
              echo "code defect: the pipeline correctly reports UPSTREAM_UNAVAILABLE"
              echo "instead of fabricating data."
              echo ""
              echo "To complete live verification, run the capture from a residential IP"
              echo "or a self-hosted runner on an allowed network. See"
              echo "docs/runbook.md → 'Source reachability (datacenter-IP blocking)'."
            } >> "$GITHUB_STEP_SUMMARY"
            echo "::error::live source unreachable from this runner (capture=$CE, extraction=$LE) — likely datacenter-IP blocking of stats.wnba.com; see the run summary and docs/runbook.md"
            exit 1
          fi
          echo "Live verification reached the source (capture and extraction both succeeded)." >> "$GITHUB_STEP_SUMMARY"
